<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Godown — Kheteshwar Hardware</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111008;
    --surface: #1C1608;
    --card: #251E0D;
    --border: #3A2E14;
    --accent: #E8A020;
    --accent2: #F5C842;
    --text: #F0E6CC;
    --muted: #8A7A55;
    --danger: #E05050;
    --success: #50C878;
    --warn: #FF9800;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--accent); letter-spacing: 3px; }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: -3px; }

  /* ── NAV ── */
  .nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    overflow-x: auto;
    padding: 0 12px;
    gap: 0;
    -webkit-overflow-scrolling: touch;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex-shrink: 0;
    padding: 12px 14px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── PAGE ── */
  .page { display: none; padding: 14px; max-width: 640px; margin: 0 auto; padding-bottom: 30px; }
  .page.active { display: block; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 11px 18px;
    border-radius: 9px;
    border: none;
    font-size: 14px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    text-decoration: none;
    user-select: none;
  }
  .btn-primary { background: var(--accent); color: #111; }
  .btn-primary:active { background: var(--accent2); transform: scale(0.97); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:active { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: #3A1515; color: var(--danger); border: 1px solid #5A2020; }
  .btn-danger:active { background: #5A2020; }
  .btn-sm { padding: 7px 13px; font-size: 12px; border-radius: 7px; }
  .btn-full { width: 100%; }
  .btn:disabled { opacity: 0.45; pointer-events: none; }

  /* ── INPUTS ── */
  input[type=text], input[type=number], input[type=search], textarea, select {
    width: 100%;
    padding: 11px 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Outfit', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  label.field-label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .field { margin-bottom: 14px; }
  .row2 { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
  }

  /* ── ITEM CARDS ── */
  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    active-scale: 0.98;
  }
  .item-card:active { transform: scale(0.98); border-color: rgba(232,160,32,0.4); }
  .item-thumb {
    width: 100%;
    height: 155px;
    object-fit: cover;
    display: block;
    background: var(--surface);
  }
  .item-thumb-placeholder {
    width: 100%;
    height: 155px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  .item-body { padding: 12px 14px; }
  .item-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .item-cat { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .item-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .qty-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--surface);
    font-size: 13px;
    font-weight: 500;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .dot.low { background: var(--warn); }
  .dot.out { background: var(--danger); }

  /* ── TAGS ── */
  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin: 7px 0; }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  .tag-x { cursor: pointer; font-size: 15px; line-height: 1; color: var(--muted); padding: 0 2px; }
  .tag-x:hover { color: var(--danger); }

  /* ── SEARCH & FILTER ── */
  .search-wrap { margin-bottom: 12px; position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
  .search-wrap input { padding-left: 36px; }
  .filter-scroll { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-size: 12px;
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s;
  }
  .chip.active { background: rgba(232,160,32,0.15); border-color: var(--accent); color: var(--accent); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border);
    width: 100%;
    max-width: 640px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 18px 18px 30px;
    -webkit-overflow-scrolling: touch;
  }
  .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 18px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; margin-bottom: 16px; }
  .modal-btn-row { display: flex; gap: 10px; margin-top: 6px; }

  /* ── FILE UPLOAD (WORKING PATTERN) ── */
  /* Key: use <label> that wraps or targets <input type=file> */
  /* The label is the visible button, input is hidden but accessible */
  .file-input-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    overflow: hidden;
    clip: rect(0,0,0,0);
  }
  .photo-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    min-height: 110px;
    border: 2px dashed var(--border);
    border-radius: 10px;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    transition: border-color 0.2s, color 0.2s;
    background: var(--bg);
  }
  .photo-label:active { border-color: var(--accent); color: var(--accent); }
  .photo-label .icon { font-size: 28px; }
  .photo-preview-wrap { position: relative; }
  .photo-preview { width: 100%; height: 160px; object-fit: cover; border-radius: 9px; display: block; }
  .photo-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.75);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 12px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    padding: 5px 10px;
    cursor: pointer;
  }

  /* ── AI PAGE ── */
  .ai-hero {
    border: 1px dashed rgba(232,160,32,0.45);
    border-radius: var(--radius);
    padding: 22px 18px;
    text-align: center;
    background: rgba(232,160,32,0.04);
    margin-bottom: 14px;
  }
  .ai-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 5px; }
  .ai-sub { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 16px; }

  .match-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    border: 1px solid rgba(232,160,32,0.3);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
  }
  .match-thumb-img { width: 54px; height: 54px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
  .match-thumb-icon { width: 54px; height: 54px; border-radius: 8px; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .match-score { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--accent); min-width: 52px; text-align: center; }

  /* ── DASHBOARD ── */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 3px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 1px; margin-bottom: 12px; margin-top: 6px; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-icon { font-size: 44px; margin-bottom: 10px; }
  .empty-text { font-size: 15px; }

  /* ── SPINNER ── */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    display: inline-block;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── VIEW DETAIL ROWS ── */
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { color: var(--muted); }
  .detail-val { font-weight: 500; text-align: right; max-width: 60%; }

  /* ── ATTR INLINE ROW ── */
  .attr-input-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .attr-input-row input { flex: 1; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #111;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(232,160,32,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 40;
    transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.92); }
  .fab.hidden { display: none; }

  /* ── MISC ── */
  .error-box { background: #3A1515; border: 1px solid #5A2020; border-radius: 9px; padding: 12px 14px; color: var(--danger); font-size: 13px; margin-bottom: 12px; }
  .success-box { background: #153A20; border: 1px solid #205A30; border-radius: 9px; padding: 12px 14px; color: var(--success); font-size: 13px; margin-bottom: 12px; }
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="logo">📦 Godown</div>
    <div class="logo-sub">Kheteshwar Hardware Store</div>
  </div>
  <div id="header-btn-area"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="switchTab('inventory')">📋 Inventory</button>
  <button class="nav-btn" onclick="switchTab('ai')">🤖 AI Match</button>
  <button class="nav-btn" onclick="switchTab('dashboard')">📊 Dashboard</button>
</div>

<!-- ═══════════════════════════════════════════
     INVENTORY PAGE
═══════════════════════════════════════════ -->
<div id="page-inventory" class="page active">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="search-input" placeholder="Search name, category, colour..." oninput="renderInventory()">
  </div>
  <div class="filter-scroll" id="filter-chips"></div>
  <div id="inventory-list"></div>
</div>

<!-- ═══════════════════════════════════════════
     AI MATCH PAGE
═══════════════════════════════════════════ -->
<div id="page-ai" class="page">
  <div class="ai-hero">
    <div class="ai-title">🤖 Smart Catalogue Match</div>
    <div class="ai-sub">Click a photo from your catalogue book.<br>AI will instantly find matching items in your godown.</div>
    <!-- FILE INPUT PATTERN: label triggers input -->
    <input
      type="file"
      id="ai-file-input"
      accept="image/*"
      class="file-input-hidden"
      onchange="handleAIImageSelected(this)"
    >
    <label for="ai-file-input" class="btn btn-primary" style="display:inline-flex;cursor:pointer;">
      📷 Open Camera / Gallery
    </label>
  </div>

  <div id="ai-preview-section" style="display:none;">
    <div class="card" style="margin-bottom:12px;">
      <label class="field-label">Catalogue Photo</label>
      <img id="ai-preview-img" src="" style="width:100%;height:200px;object-fit:cover;border-radius:9px;display:block;margin-bottom:12px;">
      <button class="btn btn-primary btn-full" id="ai-match-btn" onclick="runAIMatch()">
        🔍 Find Matching Items in Godown
      </button>
      <div style="margin-top:8px;text-align:center;">
        <label for="ai-file-input" style="font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;">Change photo</label>
      </div>
    </div>
  </div>

  <div id="ai-error" class="error-box" style="display:none;"></div>
  <div id="ai-results-section" style="display:none;">
    <div class="section-title" id="ai-results-title"></div>
    <div id="ai-results-list"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     DASHBOARD PAGE
═══════════════════════════════════════════ -->
<div id="page-dashboard" class="page">
  <div class="section-title">Godown Overview</div>
  <div class="stat-grid" id="stat-grid"></div>
  <div id="cat-breakdown"></div>
  <div id="low-stock-section"></div>
</div>

<!-- ═══════════════════════════════════════════
     FAB (Add Button)
═══════════════════════════════════════════ -->
<button class="fab" id="fab-add" onclick="openAddModal()">+</button>

<!-- ═══════════════════════════════════════════
     ADD ITEM MODAL
═══════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Item to Godown</div>

    <div class="field">
      <label class="field-label">Item Name *</label>
      <input type="text" id="add-name" placeholder="e.g. Vertical Design Door">
    </div>

    <div class="field">
      <label class="field-label">Category</label>
      <input type="text" id="add-category" placeholder="Door / Moulding / PVC Pipe / Lakda...">
    </div>

    <div class="row2">
      <div class="field">
        <label class="field-label">Quantity</label>
        <input type="number" id="add-quantity" placeholder="0" min="0">
      </div>
      <div class="field">
        <label class="field-label">Unit</label>
        <input type="text" id="add-unit" placeholder="pcs">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Size / Measurement</label>
      <input type="text" id="add-size" placeholder="e.g. 7ft × 3ft or custom">
    </div>

    <div class="field">
      <label class="field-label">Photo</label>
      <!-- WORKING FILE INPUT: hidden input + visible label -->
      <input
        type="file"
        id="add-photo-input"
        accept="image/*"
        class="file-input-hidden"
        onchange="handleAddPhoto(this)"
      >
      <div id="add-photo-preview-wrap" style="display:none;" class="photo-preview-wrap">
        <img id="add-photo-preview" class="photo-preview" src="">
        <button class="photo-remove" onclick="removeAddPhoto()">✕ Remove</button>
      </div>
      <label for="add-photo-input" id="add-photo-label" class="photo-label">
        <span class="icon">📷</span>
        <span>Tap to add photo</span>
        <span style="font-size:11px;color:var(--muted);">Camera or Gallery</span>
      </label>
    </div>

    <div class="field">
      <label class="field-label">Custom Attributes</label>
      <div class="attr-input-row">
        <input type="text" id="add-attr-key" placeholder="e.g. Colour">
        <input type="text" id="add-attr-val" placeholder="e.g. Teak">
        <button class="btn btn-primary btn-sm" onclick="addAttrToList('add')">+</button>
      </div>
      <div class="tags" id="add-attrs-tags"></div>
    </div>

    <div class="modal-btn-row">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('modal-add')">Cancel</button>
      <button class="btn btn-primary" style="flex:2" onclick="saveNewItem()">Save Item</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     VIEW ITEM MODAL
═══════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-view">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="view-content"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     EDIT ITEM MODAL
═══════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Item</div>

    <input type="hidden" id="edit-id">

    <div class="field">
      <label class="field-label">Item Name *</label>
      <input type="text" id="edit-name" placeholder="Item name">
    </div>

    <div class="field">
      <label class="field-label">Category</label>
      <input type="text" id="edit-category" placeholder="Category">
    </div>

    <div class="row2">
      <div class="field">
        <label class="field-label">Quantity</label>
        <input type="number" id="edit-quantity" placeholder="0" min="0">
      </div>
      <div class="field">
        <label class="field-label">Unit</label>
        <input type="text" id="edit-unit" placeholder="pcs">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Size / Measurement</label>
      <input type="text" id="edit-size" placeholder="Size">
    </div>

    <div class="field">
      <label class="field-label">Photo</label>
      <input
        type="file"
        id="edit-photo-input"
        accept="image/*"
        class="file-input-hidden"
        onchange="handleEditPhoto(this)"
      >
      <div id="edit-photo-preview-wrap" style="display:none;" class="photo-preview-wrap">
        <img id="edit-photo-preview" class="photo-preview" src="">
        <button class="photo-remove" onclick="removeEditPhoto()">✕ Remove</button>
      </div>
      <label for="edit-photo-input" id="edit-photo-label" class="photo-label">
        <span class="icon">📷</span>
        <span>Tap to change photo</span>
      </label>
    </div>

    <div class="field">
      <label class="field-label">Custom Attributes</label>
      <div class="attr-input-row">
        <input type="text" id="edit-attr-key" placeholder="e.g. Design">
        <input type="text" id="edit-attr-val" placeholder="e.g. Vertical">
        <button class="btn btn-primary btn-sm" onclick="addAttrToList('edit')">+</button>
      </div>
      <div class="tags" id="edit-attrs-tags"></div>
    </div>

    <div class="modal-btn-row">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('modal-edit')">Cancel</button>
      <button class="btn btn-primary" style="flex:2" onclick="saveEditItem()">Save Changes</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════
const STORAGE_KEY = 'godown_v3';

function loadItems() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveItems(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

let items = loadItems();

// Temp state for add/edit
let addAttrs = [];
let addPhotoBase64 = '';
let editAttrs = [];
let editPhotoBase64 = '';

// Current filter
let currentFilter = 'All';

// ═══════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  // Highlight correct nav btn
  const btns = document.querySelectorAll('.nav-btn');
  const idx = ['inventory','ai','dashboard'].indexOf(tab);
  if (btns[idx]) btns[idx].classList.add('active');

  // Show/hide FAB
  const fab = document.getElementById('fab-add');
  fab.classList.toggle('hidden', tab !== 'inventory');

  if (tab === 'inventory') renderInventory();
  if (tab === 'dashboard') renderDashboard();
}

// ═══════════════════════════════════════════
// RENDER INVENTORY
// ═══════════════════════════════════════════
function renderInventory() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const cats = ['All', ...new Set(items.map(i => i.category).filter(Boolean))];

  // Filter chips
  const chipContainer = document.getElementById('filter-chips');
  chipContainer.innerHTML = cats.map(c =>
    `<button class="chip${c === currentFilter ? ' active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');

  // Filter items
  const filtered = items.filter(it => {
    const matchQ = !q ||
      (it.name || '').toLowerCase().includes(q) ||
      (it.category || '').toLowerCase().includes(q) ||
      (it.attributes || []).some(a => `${a.k} ${a.v}`.toLowerCase().includes(q));
    const matchCat = currentFilter === 'All' || it.category === currentFilter;
    return matchQ && matchCat;
  });

  const container = document.getElementById('inventory-list');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty">
      <div class="empty-icon">${items.length === 0 ? '📦' : '🔍'}</div>
      <div class="empty-text">${items.length === 0 ? 'No items yet. Tap + to add your first item.' : 'No items match your search.'}</div>
    </div>`;
    return;
  }

  container.innerHTML = filtered.map(it => itemCardHTML(it)).join('');
}

function setFilter(cat) {
  currentFilter = cat;
  renderInventory();
}

function itemCardHTML(it) {
  const qty = parseInt(it.quantity) || 0;
  const dotClass = qty === 0 ? 'out' : qty <= 3 ? 'low' : '';
  const thumb = it.photo
    ? `<img class="item-thumb" src="${it.photo}" alt="${it.name}" loading="lazy">`
    : `<div class="item-thumb-placeholder">🚪</div>`;
  const attrTags = (it.attributes || []).slice(0,3).map(a =>
    `<span class="tag">${a.k}: ${a.v}</span>`
  ).join('');
  const more = (it.attributes || []).length > 3 ? `<span class="tag">+${it.attributes.length - 3} more</span>` : '';

  return `<div class="item-card" onclick="openViewModal('${it.id}')">
    ${thumb}
    <div class="item-body">
      <div class="item-name">${escHtml(it.name)}</div>
      ${it.category ? `<div class="item-cat">${escHtml(it.category)}</div>` : ''}
      <div class="tags">${attrTags}${more}</div>
      <div class="item-footer">
        <div class="qty-badge">
          <div class="dot ${dotClass}"></div>
          ${qty} ${escHtml(it.unit || 'pcs')}
        </div>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteItem('${it.id}')">🗑 Delete</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// ADD ITEM MODAL
// ═══════════════════════════════════════════
function openAddModal() {
  // Reset form
  document.getElementById('add-name').value = '';
  document.getElementById('add-category').value = '';
  document.getElementById('add-quantity').value = '';
  document.getElementById('add-unit').value = 'pcs';
  document.getElementById('add-size').value = '';
  addAttrs = [];
  addPhotoBase64 = '';
  renderAttrTags('add');
  // Reset photo
  document.getElementById('add-photo-preview-wrap').style.display = 'none';
  document.getElementById('add-photo-label').style.display = 'flex';
  document.getElementById('add-photo-input').value = '';
  openModal('modal-add');
}

function handleAddPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  compressAndSetPhoto(file, 'add');
}

function removeAddPhoto() {
  addPhotoBase64 = '';
  document.getElementById('add-photo-preview-wrap').style.display = 'none';
  document.getElementById('add-photo-label').style.display = 'flex';
  document.getElementById('add-photo-input').value = '';
}

function saveNewItem() {
  const name = document.getElementById('add-name').value.trim();
  if (!name) { showToast('⚠️ Item name is required'); return; }

  const item = {
    id: Date.now().toString(),
    name,
    category: document.getElementById('add-category').value.trim(),
    quantity: document.getElementById('add-quantity').value.trim() || '0',
    unit: document.getElementById('add-unit').value.trim() || 'pcs',
    size: document.getElementById('add-size').value.trim(),
    photo: addPhotoBase64,
    attributes: [...addAttrs],
    createdAt: Date.now()
  };

  items.unshift(item);
  saveItems(items);
  closeModal('modal-add');
  renderInventory();
  showToast('✅ Item added successfully');
}

// ═══════════════════════════════════════════
// VIEW ITEM MODAL
// ═══════════════════════════════════════════
function openViewModal(id) {
  const it = items.find(i => i.id === id);
  if (!it) return;

  const qty = parseInt(it.quantity) || 0;
  const dotClass = qty === 0 ? 'out' : qty <= 3 ? 'low' : '';

  const attrRows = (it.attributes || []).map(a =>
    `<div class="detail-row"><span class="detail-key">${escHtml(a.k)}</span><span class="detail-val">${escHtml(a.v)}</span></div>`
  ).join('');

  document.getElementById('view-content').innerHTML = `
    ${it.photo ? `<img src="${it.photo}" style="width:100%;height:190px;object-fit:cover;border-radius:10px;margin-bottom:14px;display:block;">` : ''}
    <div style="font-size:20px;font-weight:700;margin-bottom:3px;">${escHtml(it.name)}</div>
    ${it.category ? `<div style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">${escHtml(it.category)}</div>` : ''}

    <div class="card" style="margin-bottom:10px;padding:12px 14px;">
      <div class="detail-row">
        <span class="detail-key">Quantity</span>
        <span class="detail-val" style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);">${qty} ${escHtml(it.unit||'pcs')}</span>
      </div>
      ${it.size ? `<div class="detail-row"><span class="detail-key">Size</span><span class="detail-val">${escHtml(it.size)}</span></div>` : ''}
      ${attrRows}
    </div>

    <div class="modal-btn-row">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('modal-view')">Close</button>
      <button class="btn btn-primary" style="flex:2" onclick="closeModal('modal-view'); openEditModal('${it.id}')">✏️ Edit</button>
    </div>
  `;

  openModal('modal-view');
}

// ═══════════════════════════════════════════
// EDIT ITEM MODAL
// ═══════════════════════════════════════════
function openEditModal(id) {
  const it = items.find(i => i.id === id);
  if (!it) return;

  document.getElementById('edit-id').value = it.id;
  document.getElementById('edit-name').value = it.name || '';
  document.getElementById('edit-category').value = it.category || '';
  document.getElementById('edit-quantity').value = it.quantity || '';
  document.getElementById('edit-unit').value = it.unit || 'pcs';
  document.getElementById('edit-size').value = it.size || '';

  editAttrs = [...(it.attributes || [])];
  editPhotoBase64 = it.photo || '';
  renderAttrTags('edit');

  // Photo
  if (editPhotoBase64) {
    document.getElementById('edit-photo-preview').src = editPhotoBase64;
    document.getElementById('edit-photo-preview-wrap').style.display = 'block';
    document.getElementById('edit-photo-label').style.display = 'none';
  } else {
    document.getElementById('edit-photo-preview-wrap').style.display = 'none';
    document.getElementById('edit-photo-label').style.display = 'flex';
  }
  document.getElementById('edit-photo-input').value = '';

  openModal('modal-edit');
}

function handleEditPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  compressAndSetPhoto(file, 'edit');
}

function removeEditPhoto() {
  editPhotoBase64 = '';
  document.getElementById('edit-photo-preview-wrap').style.display = 'none';
  document.getElementById('edit-photo-label').style.display = 'flex';
  document.getElementById('edit-photo-input').value = '';
}

function saveEditItem() {
  const id = document.getElementById('edit-id').value;
  const name = document.getElementById('edit-name').value.trim();
  if (!name) { showToast('⚠️ Item name is required'); return; }

  items = items.map(it => {
    if (it.id !== id) return it;
    return {
      ...it,
      name,
      category: document.getElementById('edit-category').value.trim(),
      quantity: document.getElementById('edit-quantity').value.trim() || '0',
      unit: document.getElementById('edit-unit').value.trim() || 'pcs',
      size: document.getElementById('edit-size').value.trim(),
      photo: editPhotoBase64,
      attributes: [...editAttrs]
    };
  });

  saveItems(items);
  closeModal('modal-edit');
  renderInventory();
  showToast('✅ Item updated');
}

// ═══════════════════════════════════════════
// DELETE ITEM
// ═══════════════════════════════════════════
function deleteItem(id) {
  if (!confirm('Delete this item? This cannot be undone.')) return;
  items = items.filter(i => i.id !== id);
  saveItems(items);
  renderInventory();
  showToast('🗑 Item deleted');
}

// ═══════════════════════════════════════════
// ATTRIBUTES SYSTEM
// ═══════════════════════════════════════════
function addAttrToList(prefix) {
  const keyEl = document.getElementById(prefix + '-attr-key');
  const valEl = document.getElementById(prefix + '-attr-val');
  const k = keyEl.value.trim();
  const v = valEl.value.trim();
  if (!k) { showToast('⚠️ Enter attribute name'); return; }

  if (prefix === 'add') addAttrs.push({k, v});
  else editAttrs.push({k, v});

  keyEl.value = '';
  valEl.value = '';
  renderAttrTags(prefix);
}

function removeAttr(prefix, idx) {
  if (prefix === 'add') addAttrs.splice(idx, 1);
  else editAttrs.splice(idx, 1);
  renderAttrTags(prefix);
}

function renderAttrTags(prefix) {
  const attrs = prefix === 'add' ? addAttrs : editAttrs;
  const container = document.getElementById(prefix + '-attrs-tags');
  container.innerHTML = attrs.map((a, i) =>
    `<span class="tag">${escHtml(a.k)}: ${escHtml(a.v)} <span class="tag-x" onclick="removeAttr('${prefix}', ${i})">×</span></span>`
  ).join('');
}

// ═══════════════════════════════════════════
// PHOTO COMPRESSION
// ═══════════════════════════════════════════
function compressAndSetPhoto(file, prefix) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX) { h = h * MAX / w; w = MAX; }
      if (h > MAX) { w = w * MAX / h; h = MAX; }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const b64 = canvas.toDataURL('image/jpeg', 0.75);

      if (prefix === 'add') {
        addPhotoBase64 = b64;
        document.getElementById('add-photo-preview').src = b64;
        document.getElementById('add-photo-preview-wrap').style.display = 'block';
        document.getElementById('add-photo-label').style.display = 'none';
      } else if (prefix === 'edit') {
        editPhotoBase64 = b64;
        document.getElementById('edit-photo-preview').src = b64;
        document.getElementById('edit-photo-preview-wrap').style.display = 'block';
        document.getElementById('edit-photo-label').style.display = 'none';
      } else if (prefix === 'ai') {
        document.getElementById('ai-preview-img').src = b64;
        document.getElementById('ai-preview-section').style.display = 'block';
        document.getElementById('ai-results-section').style.display = 'none';
        document.getElementById('ai-error').style.display = 'none';
        window._aiBase64 = b64.split(',')[1];
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ═══════════════════════════════════════════
// AI MATCH
// ═══════════════════════════════════════════
function handleAIImageSelected(input) {
  const file = input.files[0];
  if (!file) return;
  compressAndSetPhoto(file, 'ai');
}

async function runAIMatch() {
  if (!window._aiBase64) return;
  if (items.length === 0) {
    document.getElementById('ai-error').textContent = 'Add items to inventory first before matching.';
    document.getElementById('ai-error').style.display = 'block';
    return;
  }

  const btn = document.getElementById('ai-match-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Matching with AI...';
  document.getElementById('ai-error').style.display = 'none';
  document.getElementById('ai-results-section').style.display = 'none';

  try {
    const summary = items.map(i => ({
      id: i.id,
      name: i.name,
      category: i.category || '',
      attributes: (i.attributes || []).map(a => `${a.k}: ${a.v}`).join(', '),
      size: i.size || ''
    }));

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'text',
              text: `You are an inventory matcher for a hardware store. The user has photographed a design from a catalogue book. Your job is to match it against the inventory below and find similar items.

INVENTORY:
${JSON.stringify(summary, null, 2)}

Return ONLY a valid JSON array with up to 3 best matches. Format:
[{"id":"item_id","score":85,"reason":"Brief reason why it matches"}]

Score is 0-100. If nothing matches, return []. No markdown, no explanation, just the JSON array.`
            },
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/jpeg', data: window._aiBase64 }
            }
          ]
        }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message || 'API error');

    const text = (data.content || []).find(b => b.type === 'text')?.text || '[]';
    const clean = text.replace(/```json|```/g, '').trim();
    const matches = JSON.parse(clean);

    const enriched = matches
      .map(m => ({ ...m, item: items.find(i => i.id === m.id) }))
      .filter(m => m.item);

    renderAIResults(enriched);
  } catch (err) {
    document.getElementById('ai-error').textContent = '❌ ' + (err.message || 'AI matching failed. Please try again.');
    document.getElementById('ai-error').style.display = 'block';
  }

  btn.disabled = false;
  btn.innerHTML = '🔍 Find Matching Items in Godown';
}

function renderAIResults(matches) {
  const section = document.getElementById('ai-results-section');
  const title = document.getElementById('ai-results-title');
  const list = document.getElementById('ai-results-list');

  section.style.display = 'block';

  if (matches.length === 0) {
    title.textContent = 'No Matches Found';
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No similar items found in your godown inventory.</div></div>`;
    return;
  }

  title.textContent = `${matches.length} Match${matches.length > 1 ? 'es' : ''} Found`;
  list.innerHTML = matches.map(m => {
    const it = m.item;
    const thumb = it.photo
      ? `<img class="match-thumb-img" src="${it.photo}" alt="${it.name}">`
      : `<div class="match-thumb-icon">🚪</div>`;
    return `<div class="match-card">
      ${thumb}
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:15px;margin-bottom:2px;">${escHtml(it.name)}</div>
        ${it.category ? `<div style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">${escHtml(it.category)}</div>` : ''}
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">${escHtml(m.reason)}</div>
        <div style="font-size:13px;">Stock: <strong style="color:var(--accent);">${it.quantity} ${it.unit||'pcs'}</strong></div>
      </div>
      <div class="match-score">${m.score}%</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════
function renderDashboard() {
  const total = items.length;
  const totalQty = items.reduce((s, i) => s + (parseInt(i.quantity) || 0), 0);
  const low = items.filter(i => { const q = parseInt(i.quantity)||0; return q > 0 && q <= 3; });
  const out = items.filter(i => (parseInt(i.quantity)||0) === 0);

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Items</div></div>
    <div class="stat-card"><div class="stat-num">${totalQty}</div><div class="stat-label">Total Stock</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--warn);">${low.length}</div><div class="stat-label">Low Stock</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--danger);">${out.length}</div><div class="stat-label">Out of Stock</div></div>
  `;

  const cats = [...new Set(items.map(i => i.category).filter(Boolean))];
  const catHtml = cats.length === 0 ? '' : `
    <div class="section-title">By Category</div>
    ${cats.map(c => {
      const ci = items.filter(i => i.category === c);
      const cq = ci.reduce((s, i) => s + (parseInt(i.quantity)||0), 0);
      return `<div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;">
        <div>
          <div style="font-weight:600;">${escHtml(c)}</div>
          <div style="font-size:12px;color:var(--muted);">${ci.length} item${ci.length !== 1 ? 's' : ''}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);">${cq}</div>
          <div style="font-size:11px;color:var(--muted);">total qty</div>
        </div>
      </div>`;
    }).join('')}
  `;
  document.getElementById('cat-breakdown').innerHTML = catHtml;

  const lowHtml = low.length === 0 ? '' : `
    <div class="section-title" style="color:var(--warn);">⚠️ Low Stock Alert</div>
    ${low.map(it => `<div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-color:rgba(255,152,0,0.3);">
      <span style="font-weight:500;">${escHtml(it.name)}</span>
      <span style="color:var(--warn);font-weight:600;">${it.quantity} ${it.unit||'pcs'} left</span>
    </div>`).join('')}
  `;
  document.getElementById('low-stock-section').innerHTML = lowHtml;

  if (items.length === 0) {
    document.getElementById('cat-breakdown').innerHTML = '';
    document.getElementById('low-stock-section').innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Add items to see stats</div></div>`;
  }
}

// ═══════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════
function openModal(id) {
  const el = document.getElementById(id);
  el.classList.add('open');
  // Close on backdrop click
  el.onclick = function(e) {
    if (e.target === el) closeModal(id);
  };
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderInventory();
</script>
</body>
</html>
